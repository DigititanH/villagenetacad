# PHP + React on Afrihost VPS — /etc/nginx/sites-available/villagenetacad.co.za
# sudo apt install php8.3-fpm
# sudo ln -sf /var/www/village-netacad/deploy/nginx.villagenetacad.php.conf /etc/nginx/sites-available/villagenetacad.co.za
# sudo certbot --nginx -d villagenetacad.co.za -d www.villagenetacad.co.za

server {
    listen 80;
    server_name villagenetacad.co.za www.villagenetacad.co.za;
    return 301 https://villagenetacad.co.za$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.villagenetacad.co.za;
    ssl_certificate     /etc/letsencrypt/live/villagenetacad.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/villagenetacad.co.za/privkey.pem;
    return 301 https://villagenetacad.co.za$request_uri;
}

server {
    listen 443 ssl http2;
    server_name villagenetacad.co.za;

    ssl_certificate     /etc/letsencrypt/live/villagenetacad.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/villagenetacad.co.za/privkey.pem;

    root /var/www/village-netacad/backend-php/public;
    index index.php index.html;
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
