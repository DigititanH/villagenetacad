# /etc/nginx/sites-available/villagenetacad.co.za
# sudo ln -s /etc/nginx/sites-available/villagenetacad.co.za /etc/nginx/sites-enabled/
# sudo certbot --nginx -d villagenetacad.co.za -d www.villagenetacad.co.za

server {
    listen 80;
    server_name villagenetacad.co.za www.villagenetacad.co.za;
    return 301 https://villagenetacad.co.za$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.villagenetacad.co.za;
    ssl_certificate     /etc/letsencrypt/live/villagenetacad.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/villagenetacad.co.za/privkey.pem;
    return 301 https://villagenetacad.co.za$request_uri;
}

server {
    listen 443 ssl http2;
    server_name villagenetacad.co.za;

    ssl_certificate     /etc/letsencrypt/live/villagenetacad.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/villagenetacad.co.za/privkey.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
