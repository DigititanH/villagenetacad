# Deploy PHP API + React to Azure App Service (Linux, PHP 8.2)
# Secrets: AZURE_WEBAPP_NAME, AZURE_WEBAPP_PUBLISH_PROFILE

name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  PHP_VERSION: "8.2"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_sqlite, mbstring, curl, fileinfo, json

      - name: Install frontend dependencies
        run: npm run install:all

      - name: Build frontend
        run: npm run build

      - name: Package for Azure
        shell: pwsh
        run: |
          $root = "${{ github.workspace }}"
          $azureDir = Join-Path $root "deploy/azure"
          $temp = Join-Path $env:RUNNER_TEMP "village-netacad-azure"
          if (Test-Path $temp) { Remove-Item $temp -Recurse -Force }
          New-Item -ItemType Directory -Path $temp | Out-Null
          Copy-Item (Join-Path $root "backend-php/*") $temp -Recurse -Force
          @("database.sqlite", "database.sqlite-wal", "database.sqlite-shm", ".env") | ForEach-Object {
            $p = Join-Path $temp $_
            if (Test-Path $p) { Remove-Item $p -Force }
          }
          $dist = Join-Path $root "frontend/dist"
          $public = Join-Path $temp "public"
          Get-ChildItem $dist -File | ForEach-Object {
            if ($_.Name -ne "index.php") {
              Copy-Item $_.FullName (Join-Path $public $_.Name) -Force
            }
          }
          if (Test-Path (Join-Path $dist "assets")) {
            Copy-Item (Join-Path $dist "assets") (Join-Path $public "assets") -Recurse -Force
          }
          $azureDeploy = Join-Path $temp "deploy/azure"
          New-Item -ItemType Directory -Path $azureDeploy -Force | Out-Null
          Copy-Item (Join-Path $azureDir "AZURE.md") $azureDeploy -Force
          Copy-Item (Join-Path $azureDir "env.azure.template") $azureDeploy -Force
          Copy-Item (Join-Path $azureDir "startup.sh") (Join-Path $temp "startup.sh") -Force
          $release = Join-Path $azureDir "release.zip"
          if (Test-Path $release) { Remove-Item $release -Force }
          Compress-Archive -Path "$temp/*" -DestinationPath $release

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy/azure/release.zip
