services:
  app:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_PATH: /data/database.sqlite
      UPLOADS_DIR: /data/uploads
    volumes:
      - app_data:/data
    restart: unless-stopped

volumes:
  app_data:
